<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 学术档案库 · 近日论文精选</title>
<style>
    :root {
        --hero-from: #ff5e3a;
        --hero-mid: #f73b4a;
        --hero-to: #c0392b;
        --accent: #ff6b35;
        --accent-dark: #e0552b;
        --accent-light: rgba(255,107,53,.08);
        --bg: #faf8f6;
        --card-bg: #ffffff;
        --card-border: #ede8e2;
        --text: #2c2c2c;
        --text-secondary: #6b6b6b;
        --text-muted: #999999;
        --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
        --shadow-md: 0 4px 12px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.04);
        --shadow-lg: 0 12px 32px rgba(0,0,0,.1), 0 4px 8px rgba(0,0,0,.05);
        --radius-sm: 8px;
        --radius-md: 12px;
        --radius-lg: 16px;
        --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        --timeline-dot: #ff6b35;
        --timeline-line: #ede8e2;
        --timeline-active-bg: rgba(255,107,53,.06);
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
        font-size: 14px;
      }

      /* ========= HEADER (matching daily hero) ========= */
      .header {
        position: relative; overflow: hidden;
        background: linear-gradient(135deg, var(--hero-from) 0%, var(--hero-mid) 40%, var(--hero-to) 100%);
        color: #fff;
        padding: 40px 24px 36px;
        text-align: center;
        z-index: 100;
        box-shadow: 0 4px 20px rgba(0,0,0,.15);
      }
      .header::before {
        content: '';
        position: absolute; inset: 0;
        background: radial-gradient(ellipse at 70% 30%, rgba(255,255,255,.15) 0%, transparent 60%),
                    radial-gradient(ellipse at 20% 80%, rgba(255,200,120,.12) 0%, transparent 50%);
      }
      .header-inner {
        position: relative; z-index: 1;
        max-width: 720px; margin: 0 auto;
        display: flex; flex-direction: column; align-items: center; gap: 16px;
      }
      .header-badge {
        display: inline-block;
        background: rgba(255,255,255,.2);
        backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255,255,255,.25);
        border-radius: 100px;
        padding: 4px 16px;
        font-size: 13px; font-weight: 600; letter-spacing: 0.5px;
      }
      .header-title {
        font-size: clamp(22px, 4vw, 32px);
        font-weight: 800;
        letter-spacing: -0.5px;
      }
      .header-sub {
        font-size: 14px;
        opacity: 0.85;
      }
      .header-stats {
        display: flex; justify-content: center; gap: 20px; flex-wrap: wrap;
      }
      .stat-card {
        display: flex; flex-direction: column; align-items: center;
        background: rgba(255,255,255,.15);
        backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
        border: 1px solid rgba(255,255,255,.2);
        border-radius: var(--radius-md);
        padding: 10px 18px; min-width: 80px;
      }
      .stat-num { font-size: 24px; font-weight: 800; line-height: 1.2; }
      .stat-label { font-size: 11px; opacity: 0.8; margin-top: 2px; }

      /* ========= LAYOUT ========= */
      .main {
        max-width: 1200px;
        margin: 0 auto;
        padding: 28px 24px 48px;
        display: grid;
        grid-template-columns: 160px 1fr;
        gap: 24px;
        align-items: start;
      }

      /* ========= TIMELINE ========= */
      .timeline {
        position: sticky;
        top: 24px;
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: var(--radius-lg);
        padding: 16px 12px;
        box-shadow: var(--shadow-sm);
      }
      .timeline-title {
        font-size: 11px;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: .8px;
        margin-bottom: 12px;
        padding-bottom: 8px;
        border-bottom: 1px solid var(--card-border);
      }
      .timeline-list { list-style: none; position: relative; }
      .timeline-list::before {
        content: '';
        position: absolute;
        left: 8px; top: 4px; bottom: 4px;
        width: 2px;
        background: linear-gradient(to bottom, var(--timeline-dot), var(--card-border));
        border-radius: 2px;
      }
      .timeline-item {
        position: relative;
        padding: 5px 0 5px 22px;
        cursor: pointer;
        border-radius: 6px;
        transition: background .15s;
      }
      .timeline-item:hover { background: var(--accent-light); }
      .timeline-item.active { background: var(--accent-light); }
      .timeline-item::before {
        content: '';
        position: absolute;
        left: 4px; top: 50%;
        transform: translateY(-50%);
        width: 10px; height: 10px;
        border-radius: 50%;
        background: var(--card-bg);
        border: 2px solid var(--card-border);
        transition: border-color .15s, background .15s;
      }
      .timeline-item:hover::before,
      .timeline-item.active::before {
        border-color: var(--timeline-dot);
        background: var(--timeline-dot);
      }
      .timeline-date { font-size: 12px; font-weight: 600; color: var(--text-secondary); }
      .timeline-count { font-size: 10px; color: var(--text-muted); margin-top: 1px; }

      /* ========= PAPER LIST ========= */
      .papers-section { display: flex; flex-direction: column; gap: 0; }
      .date-group { margin-bottom: 32px; }
      .date-anchor { display: block; height: 1px; margin-top: -90px; padding-top: 90px; pointer-events: none; }
      .date-header {
        display: flex; align-items: center; gap: 10px;
        margin-bottom: 14px;
        padding-bottom: 10px;
        border-bottom: 2px solid var(--card-border);
      }
      .date-pill {
        background: var(--accent);
        color: white;
        font-size: 12px;
        font-weight: 600;
        padding: 3px 12px;
        border-radius: 100px;
      }
      .date-weekday { font-size: 12px; color: var(--text-muted); }
      .date-count { font-size: 12px; color: var(--text-muted); margin-left: auto; }

      .papers-stack { display: flex; flex-direction: column; gap: 12px; }

      /* ========= PAPER CARD ========= */
      .paper-card {
        position: relative;
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: var(--radius-lg);
        padding: 20px 20px 16px;
        box-shadow: 0 1px 3px rgba(0,0,0,.06);
        transition: var(--transition);
        display: flex; flex-direction: column;
        opacity: 0;
        transform: translateY(18px);
      }
      .paper-card.visible {
        opacity: 1;
        transform: translateY(0);
      }
      .paper-card:hover {
        box-shadow: 0 4px 12px rgba(0,0,0,.07);
        transform: translateY(-2px);
      }
      .paper-card.visible:hover {
        transform: translateY(-2px);
      }
      .paper-card.selected-card {
        border-left: 3px solid var(--accent);
      }

      .card-header {
        display: flex; align-items: flex-start; gap: 10px;
        margin-bottom: 10px;
      }
      .card-num {
        position: absolute; top: -10px; left: 14px;
        background: var(--accent); color: #fff;
        font-size: 11px; font-weight: 700;
        width: 24px; height: 24px; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 2px 6px rgba(255,107,53,.35);
        flex-shrink: 0;
      }
      .selected-card .card-num {
        background: var(--accent-dark);
        box-shadow: 0 2px 8px rgba(255,107,53,.5);
      }

      .card-title-wrap { flex: 1; min-width: 0; margin-top: 6px; }
      .card-title {
        font-size: 15px;
        font-weight: 700;
        color: var(--text);
        line-height: 1.5;
        text-decoration: none;
        display: block;
      }
      .card-title:hover { color: var(--accent); }

      .card-meta {
        display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
        margin-top: 6px;
      }
      .badge {
        display: inline-block;
        font-size: 11px; font-weight: 600;
        padding: 3px 10px; border-radius: 100px;
        white-space: nowrap;
        max-width: 160px;
        overflow: hidden; text-overflow: ellipsis;
      }
      .rel-time {
        font-size: 11px;
        color: var(--text-muted);
      }
      .score-dot {
        margin-left: auto;
        font-size: 11px;
        color: var(--text-muted);
        display: flex; align-items: center; gap: 3px;
      }
      .score-star { color: #F6C90E; }

      .card-summary {
        font-size: 13px;
        color: var(--text-secondary);
        line-height: 1.65;
        margin-bottom: 14px;
        flex: 1;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .card-footer {
        display: flex; align-items: center; justify-content: flex-end;
        margin-top: auto;
        padding-top: 10px;
        border-top: 1px solid var(--card-border);
      }
      .read-link {
        display: inline-flex; align-items: center; gap: 5px;
        font-size: 13px; font-weight: 600;
        color: var(--accent);
        text-decoration: none;
        padding: 6px 14px;
        border-radius: 100px;
        background: var(--accent-light);
        transition: var(--transition);
      }
      .read-link:hover {
        background: rgba(255,107,53,.16);
        color: var(--accent-dark);
      }
      .read-link svg { width: 14px; height: 14px; }

      /* ========= SEARCH BAR ========= */
      .search-bar {
        grid-column: 1 / -1;
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: var(--radius-md);
        padding: 10px 16px;
        box-shadow: var(--shadow-sm);
        display: flex; align-items: center; gap: 10px;
        margin-bottom: 4px;
      }
      .search-input {
        border: none; outline: none;
        width: 100%;
        font-size: 14px;
        color: var(--text);
        background: transparent;
      }
      .search-input::placeholder { color: var(--text-muted); }
      .search-icon { color: var(--text-muted); flex-shrink: 0; }
      .search-count { font-size: 12px; color: var(--text-muted); white-space: nowrap; }

      /* ========= FOOTER ========= */
      .footer {
        text-align: center;
        padding: 32px 16px 40px;
        border-top: 1px solid var(--card-border);
        color: var(--text-muted);
        font-size: 13px;
        max-width: 1200px; margin: 0 auto;
      }
      .footer a { color: var(--accent); text-decoration: none; }
      .footer a:hover { text-decoration: underline; }

      /* ========= BACK TO TOP ========= */
      .quick-top {
        position: fixed; bottom: 24px; right: 24px;
        width: 44px; height: 44px; border-radius: 50%;
        background: var(--accent); color: #fff;
        border: none; cursor: pointer; font-size: 20px;
        box-shadow: 0 12px 32px rgba(0,0,0,.1);
        opacity: 0; transform: translateY(12px);
        pointer-events: none; transition: var(--transition); z-index: 200;
        display: flex; align-items: center; justify-content: center;
      }
      .quick-top.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
      .quick-top:hover { background: var(--accent-dark); }

      /* ========= RESPONSIVE ========= */
      @media (max-width: 768px) {
        .header { padding: 32px 16px 28px; }
        .header-stats { gap: 10px; }
        .stat-card { padding: 8px 14px; min-width: 64px; }
        .stat-num { font-size: 20px; }
        .main {
          grid-template-columns: 1fr;
          padding: 16px;
        }
        .timeline { position: static; display: none; }
        .search-bar { grid-column: 1; }
        .card-title { font-size: 14px; }
        .paper-card { padding: 16px 16px 14px; }
      }
    
</style>
</head>

{"idx": 5, "title": "LACUNA：评估LLM遗忘定位精度的测试平台", "source": "arxiv", "badgeLabel": "arxiv", "badgeBg": "#fce4ec", "badgeColor": "#c0392b", "publishedAt": "2026-07-02T17:59:52Z", "dateStr": "2026-07-02", "url": "https://arxiv.org/abs/2607.02513v1", "summary": "LLM会记忆敏感的训练数据，包括个人身份信息（PII），这产生了对可靠的事后移除方法的迫切需求。遗忘已成为一种有前景的解决方案，最先进（SOTA）方法通常遵循先定位、后遗忘的范式，针对特定模型参数。然而，现有基准仅在输出层面评估遗忘，留下了遗忘是否真正从模型参数中擦除知识的疑问。", "selected": false, "score": 0},
{"idx": 6, "title": "程序即权重：面向模糊函数的编程范式", "source": "arxiv", "badgeLabel": "arxiv", "badgeBg": "#fce4ec", "badgeColor": "#c0392b", "publishedAt": "2026-07-02T17:59:50Z", "dateStr": "2026-07-02", "url": "https://arxiv.org/abs/2607.02512v1", "summary": "许多日常编程任务难以通过清晰的规则实现，例如对重要日志行进行告警、修复格式错误的JSON或按意图对搜索结果排序，这些任务正越来越多地被外包给大型语言模型API，但代价是牺牲了本地性、可复现性和价格。我们提出模糊函数编程：将此类函数从自然语言规范编译为紧凑的、可本地执行的神经工件。我们通过程序即权重（P）实例化这一范式。", "selected": false, "score": 0},
{"idx": 7, "title": "大语言模型的在线安全监控", "source": "arxiv", "badgeLabel": "arxiv", "badgeBg": "#fce4ec", "badgeColor": "#c0392b", "publishedAt": "2026-07-02T17:59:43Z", "dateStr": "2026-07-02", "url": "https://arxiv.org/abs/2607.02510v1", "summary": "尽管经过对齐训练，大语言模型在部署时仍容易生成不安全输出。因此，在线监控输出并在无法再保证安全时发出警报至关重要。我们研究了一种简单的实时监控器，它通过阈值化将外部模型的验证信号转化为警报决策，阈值通过风险控制进行校准。在数学推理和红队测试数据集上的实验表明，这种简单设计具有竞争力。", "selected": false, "score": 0},
{"idx": 8, "title": "ReContext：作为大语言模型长上下文推理工具的递归证据重放", "source": "arxiv", "badgeLabel": "arxiv", "badgeBg": "#fce4ec", "badgeColor": "#c0392b", "publishedAt": "2026-07-02T17:59:26Z", "dateStr": "2026-07-02", "url": "https://arxiv.org/abs/2607.02509v1", "summary": "理解和推理长上下文已成为在现实应用中部署大语言模型的关键需求。尽管近期的大语言模型支持越来越长的上下文窗口，但它们常常无法利用输入中已有的相关证据，揭示了上下文访问与有效上下文利用之间的差距。在这项工作中，我们提出递归证据重放作为大语言模型长上下文推理工具（RECONTEXT），一种无需训练的推理方法。", "selected": false, "score": 0},
{"idx": 9, "title": "从SRA到Self-Flow：数据增强还是自监督？", "source": "arxiv", "badgeLabel": "arxiv", "badgeBg": "#fce4ec", "badgeColor": "#c0392b", "publishedAt": "2026-07-02T17:59:25Z", "dateStr": "2026-07-02", "url": "https://arxiv.org/abs/2607.02508v1", "summary": "表示对齐已成为加速扩散变换器训练和提高生成质量的有效方法。最近的自我对齐方法，如SRA和Self-Flow，通过在扩散模型内部构建对齐，进一步消除了对外部预训练编码器的依赖。然而，从SRA到Self-Flow改进背后的机制——双时间调度——仍未得到充分检验：Self-Flow将其增益归因于不同时间步令牌之间的交互。", "selected": false, "score": 0},
{"idx": 10, "title": "无人监督时大语言模型智能体在说什么：多智能体辩论中的社会结构与潜在目标涌现", "source": "arxiv", "badgeLabel": "arxiv", "badgeBg": "#fce4ec", "badgeColor": "#c0392b", "publishedAt": "2026-07-02T17:59:23Z", "dateStr": "2026-07-02", "url": "https://arxiv.org/abs/2607.02507v1", "summary": "大语言模型智能体将越来越多地在具有社会结构的场景中行动，其中角色、受众和关系背景会影响说什么有利或代价高昂。我们研究这种社会结构，在提示中没有任何明确目标的情况下，是否会改变智能体在相同条件下相对于非记录渠道公开表达的内容。我们引入了一个双通道辩论框架，其中智能体生成公开话语进入共享历史，同时伴随非记录响应。", "selected": false, "score": 0},

{"idx": 16, "title": "主动感知全景指代分割：从搜索到分割", "source": "arxiv", "badgeLabel": "arxiv", "badgeBg": "#fce4ec", "badgeColor": "#c0392b", "publishedAt": "2026-07-02T17:56:49Z", "dateStr": "2026-07-02", "url": "https://arxiv.org/abs/2607.02497v1", "summary": "现有的指代分割模型被动处理固定视角下的静态图像，限制了其在具身智能中的应用——智能体需要在连续360°环境中进行主动感知。为弥合这一差距，我们提出新任务：主动全景指代分割（APRS）。在该设定中，智能体需调整视角（Δθ, Δφ）探索360°环境，寻找用户指令指定的目标物体。", "selected": false, "score": 0},
{"idx": 17, "title": "基于行为潜变量的可控仿真智能体", "source": "arxiv", "badgeLabel": "arxiv", "badgeBg": "#fce4ec", "badgeColor": "#c0392b", "publishedAt": "2026-07-02T17:55:39Z", "dateStr": "2026-07-02", "url": "https://arxiv.org/abs/2607.02496v1", "summary": "逼真的交通仿真需要既能模仿记录行为、又能沿可解释轴进行操控的智能体。这种可控性使工程师能够隔离变量、复现特定边缘案例，并在无真实世界风险下测试自动驾驶系统。我们提出可控神经变分智能体（CNeVA），一种可控仿真智能体框架，通过闭式共轭变分推断从每通道折扣回报中学习推断每个智能体的高斯行为潜变量。", "selected": false, "score": 0},
{"idx": 18, "title": "无需训练的概念定位：提升对排版攻击的鲁棒性", "source": "arxiv", "badgeLabel": "arxiv", "badgeBg": "#fce4ec", "badgeColor": "#c0392b", "publishedAt": "2026-07-02T17:55:24Z", "dateStr": "2026-07-02", "url": "https://arxiv.org/abs/2607.02494v1", "summary": "通过对比语言-图像预训练（CLIP）训练的模型是现代大型视觉语言模型（LVLMs）的基础视觉编码器。尽管被广泛采用，CLIP模型存在一个关键但未被充分探索的失效模式：图像中出现的无关文本会混淆视觉表征，使其偏向词汇含义而非真实视觉语义。这种鲁棒性问题通常被称为排版攻击（TA），暴露了模型的脆弱性。", "selected": false, "score": 0},
{"idx": 19, "title": "G-RRM：用循环推理模型引导符号求解器", "source": "arxiv", "badgeLabel": "arxiv", "badgeBg": "#fce4ec", "badgeColor": "#c0392b", "publishedAt": "2026-07-02T17:53:31Z", "dateStr": "2026-07-02", "url": "https://arxiv.org/abs/2607.02491v1", "summary": "本文聚焦于SE-RRM——一种符号等变实例化的循环推理模型，展现出对更大规模问题的改进外推能力。我们提出神经符号方法“循环推理模型引导”（G-RRM），将SE-RRM与约束满足问题的符号求解器相结合。SE-RRM作为神经求解器生成完整解方案，并引导经典符号求解器（如回溯法或基于SAT的方法Glucose 4.1和CaDiCaL 3.0.0）。", "selected": false, "score": 0},

{"idx": 24, "title": "QuadRocket：用于火箭类飞行器自适应推力矢量控制的空中机器人试验台", "source": "arxiv", "badgeLabel": "arxiv", "badgeBg": "#fce4ec", "badgeColor": "#c0392b", "publishedAt": "2026-07-02T17:43:09Z", "dateStr": "2026-07-02", "url": "https://arxiv.org/abs/2607.02474v1", "summary": "本文介绍了QuadRocket，一种基于四旋翼的火箭原型，为验证运载火箭类系统的先进推力矢量控制策略提供了低成本、低风险的平台。该原型由一个通过万向节安装在四旋翼顶部的圆柱形主体组成，形成一个具有不可忽略惯性的飞行倒立摆。在控制设计中，耦合系统被建模为一个由沿轴施加的矢量力驱动的单轴对称刚体", "selected": false, "score": 0},

<script>
(function(){
  var WEEKDAYS = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];

  function relativeTime(isoStr){
    var now = Date.now();
    var t = new Date(isoStr).getTime();
    var diff = Math.floor((now - t) / 1000);
    if(diff < 60) return '刚刚';
    if(diff < 3600) return Math.floor(diff/60) + ' 分钟前';
    if(diff < 86400) return Math.floor(diff/3600) + ' 小时前';
    if(diff < 604800) return Math.floor(diff/86400) + ' 天前';
    return new Date(isoStr).toLocaleDateString('zh-CN',{month:'numeric',day:'numeric'});
  }

  function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function escAttr(s){ return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;'); }

  function buildTimeline(){
    var list = document.getElementById('timelineList');
    if(!list) return;
    list.innerHTML = '';
    window.TIMELINE_DATA.forEach(function(g){
      var li = document.createElement('li');
      li.className = 'timeline-item';
      li.dataset.date = g.date;
      li.innerHTML = '<div class="timeline-date">' + g.date.slice(5) + '</div>'
        + '<div class="timeline-count">' + g.wd + ' · ' + g.count + ' 篇</div>';
      li.addEventListener('click', function(){
        var el = document.getElementById('anchor-' + g.date);
        if(el) el.scrollIntoView({behavior:'smooth', block:'start'});
      });
      list.appendChild(li);
    });
  }

  function buildCards(filtered){
    var section = document.getElementById('papersSection');
    if(!section) return;
    section.innerHTML = '';

    var groups = {};
    filtered.forEach(function(p){
      if(!groups[p.dateStr]) groups[p.dateStr] = [];
      groups[p.dateStr].push(p);
    });
    var sortedDates = Object.keys(groups).sort(function(a,b){ return b.localeCompare(a); });

    var timelineGroups = sortedDates.map(function(d){
      return {date:d, wd:WEEKDAYS[new Date(d+'T00:00:00+08:00').getDay()], count:groups[d].length};
    });
    window.TIMELINE_DATA = timelineGroups;
    buildTimeline();

    sortedDates.forEach(function(date){
      var grp = groups[date];
      var d = new Date(date + 'T00:00:00+08:00');
      var wd = WEEKDAYS[d.getDay()];
      var groupEl = document.createElement('div');
      groupEl.className = 'date-group';
      var anchor = document.createElement('div');
      anchor.className = 'date-anchor';
      anchor.id = 'anchor-' + date;
      groupEl.appendChild(anchor);
      var header = document.createElement('div');
      header.className = 'date-header';
      header.innerHTML = '<span class="date-pill">' + date + '</span>'
        + '<span class="date-weekday">' + wd + '</span>'
        + '<span class="date-count">' + grp.length + ' 篇</span>';
      groupEl.appendChild(header);
      var stack = document.createElement('div');
      stack.className = 'papers-stack';

      grp.forEach(function(p){
        var card = document.createElement('div');
        card.className = 'paper-card' + (p.selected ? ' selected-card' : '');
        card.dataset.id = p.idx;
        var shtml = '';
        if(p.summary && p.summary !== '暂无摘要'){
          shtml = '<div class="card-summary">' + escHtml(p.summary) + '</div>';
        }
        card.innerHTML =
          '<div class="card-header">' +
            '<div class="card-num">' + p.idx + '</div>' +
            '<div class="card-title-wrap">' +
              '<a class="card-title" href="' + escAttr(p.url) + '" target="_blank" rel="noopener">' + escHtml(p.title) + '</a>' +
              '<div class="card-meta">' +
                '<span class="badge" style="background:' + escAttr(p.badgeBg) + ';color:' + escAttr(p.badgeColor) + '" title="' + escAttr(p.source) + '">' + escHtml(p.badgeLabel) + '</span>' +
                '<span class="rel-time">' + relativeTime(p.publishedAt) + '</span>' +
                '<span class="score-dot"><span class="score-star">\u2605</span>' + p.score + '</span>' +
              '</div>' +
            '</div>' +
          '</div>' +
          shtml +
          '<div class="card-footer">' +
            '<a class="read-link" href="' + escAttr(p.url) + '" target="_blank" rel="noopener">' +
              '<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 16 16\" fill=\"currentColor\"><path d=\"M8.636 3.5a.5.5 0 0 0-.5-.5H1.5A1.5 1.5 0 0 0 0 4.5v10A1.5 1.5 0 0 0 1.5 16h10a1.5 1.5 0 0 0 1.5-1.5V7.864a.5.5 0 0 0-1 0V14.5a.5.5 0 0 1-.5.5h-10a.5.5 0 0 1-.5-.5v-10a.5.5 0 0 1 .5-.5h6.636a.5.5 0 0 0 .5-.5z\"/><path d=\"M16 .5a.5.5 0 0 0-.5-.5h-5a.5.5 0 0 0 0 1h3.793L6.146 9.146a.5.5 0 1 0 .708.708L15 1.707V5.5a.5.5 0 0 0 1 0v-5z\"/></svg>' + ' 阅读原文</a>' +
          '</div>';
        stack.appendChild(card);
      });
      groupEl.appendChild(stack);
      section.appendChild(groupEl);
    });

    document.getElementById('filtered-count').textContent = filtered.length;

    var observer = new IntersectionObserver(function(entries){
      entries.forEach(function(e){
        if(e.isIntersecting){ e.target.classList.add('visible'); observer.unobserve(e.target); }
      });
    }, {threshold:0.08, rootMargin:'0px 0px -40px 0px'});
    document.querySelectorAll('.paper-card').forEach(function(el){ observer.observe(el); });

    highlightTimeline();
  }

  function highlightTimeline(){
    var groups = document.querySelectorAll('.date-group');
    var tItems = document.querySelectorAll('.timeline-item');
    var scrollY = window.scrollY + 160;
    var activeDate = null;
    groups.forEach(function(g){
      var anchor = g.querySelector('.date-anchor');
      if(anchor && anchor.getBoundingClientRect().top + window.scrollY <= scrollY){
        activeDate = g.querySelector('.date-anchor').id.replace('anchor-','');
      }
    });
    tItems.forEach(function(item){
      item.classList.toggle('active', item.dataset.date === activeDate);
    });
  }

  window.addEventListener('scroll', highlightTimeline, {passive:true});

  var searchInput = document.getElementById('searchInput');
  var searchCount = document.getElementById('searchCount');
  var debounceTimer;
  if(searchInput){
    searchInput.addEventListener('input', function(){
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(function(){
        var q = searchInput.value.trim().toLowerCase();
        var filtered;
        if(!q){ filtered = window.PAPERS; }
        else { filtered = window.PAPERS.filter(function(p){
          return (p.title && p.title.toLowerCase().indexOf(q)!==-1)
              || (p.summary && p.summary.toLowerCase().indexOf(q)!==-1)
              || (p.source && p.source.toLowerCase().indexOf(q)!==-1)
              || (p.badgeLabel && p.badgeLabel.toLowerCase().indexOf(q)!==-1);
        }); }
        searchCount.textContent = filtered.length + ' 篇';
        buildCards(filtered);
      }, 250);
    });
  }

  buildCards(window.PAPERS);
  buildTimeline();

  /* ---- back to top ---- */
  var qtop = document.getElementById('quickTop');
  window.addEventListener('scroll', function(){
    qtop.classList.toggle('visible', window.scrollY > 400);
  });
})();

</script>

<div class="quick-top" id="quickTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</div>

</body>
</html>
