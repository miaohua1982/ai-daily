# Daily news 配置

# 数据获取配置
fetch:
  # AI HOT 公共 API 地址（主源）
  api_base: "https://aihot.virxact.com/api/public"
  # 备用数据源（当主源不可用时自动切换）
  fallback_base: "https://newsnow.busiyi.world"
  fallback_path: "/api/s?id=aihot&latest"
  # 单个 API 请求失败时的最大重试次数（默认 3）
  max_retries: 3
  # 目标日期（YYYY-MM-DD），默认取当前
  target_date: null

# 语义去重配置
# 对同一新闻在不同来源重复出现的情况做 embedding 相似度去重
semantic_dedup:
  enabled: true
  # 读取 API Key 的环境变量名
  api_key_env: "EMBEDDING_API_KEY"
  # OpenAI 兼容的 embedding API 地址
  base_url: "https://llm-860ckp050tycaw8n.cn-beijing.maas.aliyuncs.com/compatible-mode/v1"
  # embedding 模型名
  model: "text-embedding-v4"
  # 余弦相似度阈值（0.0-1.0），>= 此值视为重复
  threshold: 0.75
  # 单次请求最大文本数（阿里 Qwen embedding 限制为 10 条）
  batch_size: 10

# 过滤配置
filter:
  # 摘要有效字符数下限，低于此值的新闻将被过滤
  min_summary_len: 20
