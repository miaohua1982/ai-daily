# WeChat 公众号草稿发布配置

# 微信公众号 API 地址
wechat_base: "https://api.weixin.qq.com"

# 站点地址（用于 HTML 中链接回源）
repo_url: "https://miaohua1982.github.io/ai-daily/"

# 草稿标题模板（{date} 替换为 YYYYMMDD 格式）
title_template: "AI情报 | {date}"

# 草稿摘要模板
# {news_count} 和 {papers_count} 替换为对应条数
digest_template: "今日 {news_count} 条AI热点 · {papers_count} 篇精选论文"
digest_fallback: "每日AI情报汇总"

# 作者名
author: "ai-daily"

# 内容截断上限
max_news: 10
max_papers: 10

# ── 全量统一去重：news + papers 的唯一去重入口（必做，无开关）──
# fetch_news/fetch_papers 只抓取 + 过滤、不去重；cross_dedup 承担全部去重：
#   1. URL 精确去重（无条件执行，去 fragment 后按 sourceUrl/url/mobileUrl 比对）
#   2. 语义去重（凭证可用时执行）：集合内 + 集合间一次跑全量，统一阈值
# 重复时保留 news、删除 papers 中撞车项（news 在 merged 列表前置，保留第一个）。
cross_dedup:
  # 统一阈值：集合内 + 集合间共用
  # （合并后折中收敛为 0.75）
  threshold: 0.75
  # 复用现有 embedding 凭证，与 news/papers 同一套
  api_key_env: "EMBEDDING_API_KEY"
  base_url: "https://llm-860ckp050tycaw8n.cn-beijing.maas.aliyuncs.com/compatible-mode/v1"
  model: "text-embedding-v4"
  batch_size: 10

# 环境变量：从哪个环境变量读取微信 API 凭证
appid_env: "WECHAT_APPID"
appsecret_env: "WECHAT_APPSECRET"