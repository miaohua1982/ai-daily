<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>AI 学术档案库 · 近日论文精选</title>
<style>
:root {
    --bg: #F0F4F8;
    --surface: #FFFFFF;
    --surface2: #EDF2F7;
    --border: #CBD5E0;
    --border-light: #E2E8F0;
    --text-primary: #1A2332;
    --text-secondary: #4A5568;
    --text-muted: #718096;
    --accent: #2B6CB0;
    --accent-light: #EBF4FF;
    --accent-hover: #2C5282;
    --timeline-color: #3182CE;
    --timeline-dot: #2B6CB0;
    --shadow-sm: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
    --shadow-md: 0 4px 12px rgba(0,0,0,.10), 0 2px 4px rgba(0,0,0,.06);
    --shadow-lg: 0 10px 24px rgba(0,0,0,.12);
    --radius: 10px;
    --radius-sm: 6px;
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans SC", sans-serif;
    --font-mono: "JetBrains Mono", "Fira Code", "SF Mono", monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: var(--font-sans);
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ========= HEADER ========= */
  .header {
    background: linear-gradient(135deg, #1A365D 0%, #2B6CB0 60%, #3182CE 100%);
    color: white;
    padding: 32px 0 28px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 16px rgba(26,54,93,.35);
  }
  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }
  .header-left { display: flex; flex-direction: column; gap: 4px; }
  .header-title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -.3px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header-icon {
    width: 32px; height: 32px;
    background: rgba(255,255,255,.2);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .header-sub {
    font-size: 13px;
    color: rgba(255,255,255,.75);
    margin-left: 42px;
  }
  .header-stats {
    display: flex; gap: 16px; flex-wrap: wrap;
  }
  .stat-card {
    background: rgba(255,255,255,.15);
    border: 1px solid rgba(255,255,255,.2);
    border-radius: 8px;
    padding: 8px 16px;
    text-align: center;
    backdrop-filter: blur(6px);
  }
  .stat-num { font-size: 22px; font-weight: 700; line-height: 1.2; }
  .stat-label { font-size: 11px; color: rgba(255,255,255,.7); text-transform: uppercase; letter-spacing: .5px; }

  /* ========= LAYOUT ========= */
  .main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 28px 24px;
    display: grid;
    grid-template-columns: 160px 1fr;
    gap: 24px;
    align-items: start;
  }

  /* ========= TIMELINE ========= */
  .timeline {
    position: sticky;
    top: 120px;
    background: var(--surface);
    border: 1px solid var(--border-light);
    border-radius: var(--radius);
    padding: 16px 12px;
    box-shadow: var(--shadow-sm);
  }
  .timeline-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: .8px;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border-light);
  }
  .timeline-list { list-style: none; position: relative; }
  .timeline-list::before {
    content: '';
    position: absolute;
    left: 8px; top: 4px; bottom: 4px;
    width: 2px;
    background: linear-gradient(to bottom, var(--timeline-color), var(--border-light));
    border-radius: 2px;
  }
  .timeline-item {
    position: relative;
    padding: 4px 0 4px 22px;
    cursor: pointer;
    border-radius: 5px;
    transition: background .15s;
  }
  .timeline-item:hover { background: var(--accent-light); }
  .timeline-item.active { background: var(--accent-light); }
  .timeline-item::before {
    content: '';
    position: absolute;
    left: 4px; top: 50%;
    transform: translateY(-50%);
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--surface);
    border: 2px solid var(--border);
    transition: border-color .15s, background .15s;
  }
  .timeline-item:hover::before,
  .timeline-item.active::before {
    border-color: var(--timeline-dot);
    background: var(--timeline-dot);
  }
  .timeline-date { font-size: 12px; font-weight: 600; color: var(--text-secondary); }
  .timeline-count { font-size: 10px; color: var(--text-muted); margin-top: 1px; }

  /* ========= PAPER LIST ========= */
  .papers-section { display: flex; flex-direction: column; gap: 0; }
  .date-group { margin-bottom: 28px; }
  .date-anchor { display: block; height: 1px; margin-top: -90px; padding-top: 90px; pointer-events: none; }
  .date-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--border-light);
  }
  .date-pill {
    background: var(--accent);
    color: white;
    font-size: 12px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    font-family: var(--font-mono);
  }
  .date-weekday { font-size: 12px; color: var(--text-muted); }
  .date-count { font-size: 11px; color: var(--text-muted); margin-left: auto; }

  .papers-stack { display: flex; flex-direction: column; gap: 10px; }

  /* ========= PAPER CARD ========= */
  .paper-card {
    background: var(--surface);
    border: 1px solid var(--border-light);
    border-radius: var(--radius);
    padding: 16px 18px;
    box-shadow: var(--shadow-sm);
    transition: transform .2s ease, box-shadow .2s ease, border-color .2s;
    opacity: 0;
    transform: translateY(18px);
    cursor: default;
    position: relative;
  }
  .paper-card.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .paper-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
    border-color: var(--accent);
  }
  .paper-card.selected-card {
    border-left: 3px solid var(--timeline-dot);
  }

  .card-header {
    display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px;
  }
  .card-num {
    flex-shrink: 0;
    width: 26px; height: 26px;
    background: var(--surface2);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    font-family: var(--font-mono);
    font-weight: 600;
    color: var(--text-muted);
    margin-top: 1px;
  }
  .selected-card .card-num {
    background: var(--accent-light);
    color: var(--accent);
  }

  .card-title-wrap { flex: 1; min-width: 0; }
  .card-title {
    font-size: 14.5px;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1.45;
    text-decoration: none;
    display: block;
  }
  .card-title:hover { color: var(--accent); }

  .card-meta {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    margin-top: 6px;
  }
  .badge {
    display: inline-block;
    color: white;
    font-size: 10.5px;
    font-weight: 500;
    padding: 2px 7px;
    border-radius: 4px;
    white-space: nowrap;
    max-width: 140px;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .rel-time {
    font-size: 11px;
    color: var(--text-muted);
    font-family: var(--font-mono);
  }
  .score-dot {
    margin-left: auto;
    font-size: 10px;
    color: var(--text-muted);
    display: flex; align-items: center; gap: 3px;
  }
  .score-star { color: #F6C90E; }

  .card-summary {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.65;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border-light);
  }

  .card-footer {
    display: flex; align-items: center; justify-content: flex-end;
    margin-top: 10px;
  }
  .read-link {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--accent-light);
    color: var(--accent);
    font-size: 12px;
    font-weight: 500;
    padding: 5px 12px;
    border-radius: 5px;
    text-decoration: none;
    transition: background .15s, color .15s;
    border: 1px solid rgba(43,108,176,.2);
  }
  .read-link:hover {
    background: var(--accent);
    color: white;
  }
  .read-link svg { width: 12px; height: 12px; }

  /* ========= SEARCH BAR ========= */
  .search-bar {
    grid-column: 1 / -1;
    background: var(--surface);
    border: 1px solid var(--border-light);
    border-radius: var(--radius);
    padding: 10px 14px;
    box-shadow: var(--shadow-sm);
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 4px;
  }
  .search-input {
    border: none; outline: none;
    width: 100%;
    font-size: 13.5px;
    color: var(--text-primary);
    background: transparent;
    font-family: var(--font-sans);
  }
  .search-input::placeholder { color: var(--text-muted); }
  .search-icon { color: var(--text-muted); flex-shrink: 0; }
  .search-count { font-size: 12px; color: var(--text-muted); white-space: nowrap; }

  /* ========= FOOTER ========= */
  .footer {
    text-align: center;
    padding: 24px;
    color: var(--text-muted);
    font-size: 12px;
    border-top: 1px solid var(--border-light);
    margin-top: 16px;
  }
  .footer a { color: var(--accent); text-decoration: none; }

  /* ========= RESPONSIVE ========= */
  @media (max-width: 768px) {
    .main {
      grid-template-columns: 1fr;
      padding: 16px;
    }
    .timeline { position: static; display: none; }
    .search-bar { grid-column: 1; }
    .header-stats { display: none; }
  }
</style>
</head>

<script>
(function(){
  var WEEKDAYS = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];

  function relativeTime(isoStr){
    var now = Date.now();
    var t = new Date(isoStr).getTime();
    var diff = Math.floor((now - t) / 1000);
    if(diff < 60) return '刚刚';
    if(diff < 3600) return Math.floor(diff/60) + ' 分钟前';
    if(diff < 86400) return Math.floor(diff/3600) + ' 小时前';
    if(diff < 604800) return Math.floor(diff/86400) + ' 天前';
    return new Date(isoStr).toLocaleDateString('zh-CN',{month:'numeric',day:'numeric'});
  }

  function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function escAttr(s){ return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;'); }

  function buildTimeline(){
    var list = document.getElementById('timelineList');
    if(!list) return;
    list.innerHTML = '';
    window.TIMELINE_DATA.forEach(function(g){
      var li = document.createElement('li');
      li.className = 'timeline-item';
      li.dataset.date = g.date;
      li.innerHTML = '<div class="timeline-date">' + g.date.slice(5) + '</div>'
        + '<div class="timeline-count">' + g.wd + ' \u00b7 ' + g.count + ' 篇</div>';
      li.addEventListener('click', function(){
        var el = document.getElementById('anchor-' + g.date);
        if(el) el.scrollIntoView({behavior:'smooth', block:'start'});
      });
      list.appendChild(li);
    });
  }

  function buildCards(filtered){
    var section = document.getElementById('papersSection');
    if(!section) return;
    section.innerHTML = '';

    var groups = {};
    filtered.forEach(function(p){
      if(!groups[p.dateStr]) groups[p.dateStr] = [];
      groups[p.dateStr].push(p);
    });
    var sortedDates = Object.keys(groups).sort(function(a,b){ return b.localeCompare(a); });

    var timelineGroups = sortedDates.map(function(d){
      return {date:d, wd:WEEKDAYS[new Date(d+'T00:00:00+08:00').getDay()], count:groups[d].length};
    });
    window.TIMELINE_DATA = timelineGroups;
    buildTimeline();

    sortedDates.forEach(function(date){
      var grp = groups[date];
      var d = new Date(date + 'T00:00:00+08:00');
      var wd = WEEKDAYS[d.getDay()];
      var groupEl = document.createElement('div');
      groupEl.className = 'date-group';
      var anchor = document.createElement('div');
      anchor.className = 'date-anchor';
      anchor.id = 'anchor-' + date;
      groupEl.appendChild(anchor);
      var header = document.createElement('div');
      header.className = 'date-header';
      header.innerHTML = '<span class="date-pill">' + date + '</span>'
        + '<span class="date-weekday">' + wd + '</span>'
        + '<span class="date-count">' + grp.length + ' 篇</span>';
      groupEl.appendChild(header);
      var stack = document.createElement('div');
      stack.className = 'papers-stack';

      grp.forEach(function(p){
        var card = document.createElement('div');
        card.className = 'paper-card' + (p.selected ? ' selected-card' : '');
        card.dataset.id = p.idx;
        var shtml = '';
        if(p.summary && p.summary !== '暂无摘要'){
          shtml = '<div class="card-summary">' + escHtml(p.summary) + '</div>';
        }
        card.innerHTML =
          '<div class="card-header">' +
            '<div class="card-num">' + p.idx + '</div>' +
            '<div class="card-title-wrap">' +
              '<a class="card-title" href="' + escAttr(p.url) + '" target="_blank" rel="noopener">' + escHtml(p.title) + '</a>' +
              '<div class="card-meta">' +
                '<span class="badge" style="background:' + escAttr(p.badgeColor) + '" title="' + escAttr(p.source) + '">' + escHtml(p.badgeLabel) + '</span>' +
                '<span class="rel-time">' + relativeTime(p.publishedAt) + '</span>' +
                '<span class="score-dot"><span class="score-star">\u2605</span>' + p.score + '</span>' +
              '</div>' +
            '</div>' +
          '</div>' +
          shtml +
          '<div class="card-footer">' +
            '<a class="read-link" href="' + escAttr(p.url) + '" target="_blank" rel="noopener">' +
              '<svg xmlns=\\"http://www.w3.org/2000/svg\\" viewBox=\\"0 0 16 16\\" fill=\\"currentColor\\"><path d=\\"M8.636 3.5a.5.5 0 0 0-.5-.5H1.5A1.5 1.5 0 0 0 0 4.5v10A1.5 1.5 0 0 0 1.5 16h10a1.5 1.5 0 0 0 1.5-1.5V7.864a.5.5 0 0 0-1 0V14.5a.5.5 0 0 1-.5.5h-10a.5.5 0 0 1-.5-.5v-10a.5.5 0 0 1 .5-.5h6.636a.5.5 0 0 0 .5-.5z\\"/><path d=\\"M16 .5a.5.5 0 0 0-.5-.5h-5a.5.5 0 0 0 0 1h3.793L6.146 9.146a.5.5 0 1 0 .708.708L15 1.707V5.5a.5.5 0 0 0 1 0v-5z\\"/></svg> + ' \u9605\u8bfb\u539f\u6587</a>' +
          '</div>';
        stack.appendChild(card);
      });
      groupEl.appendChild(stack);
      section.appendChild(groupEl);
    });

    document.getElementById('filtered-count').textContent = filtered.length;

    var observer = new IntersectionObserver(function(entries){
      entries.forEach(function(e){
        if(e.isIntersecting){ e.target.classList.add('visible'); observer.unobserve(e.target); }
      });
    }, {threshold:0.08, rootMargin:'0px 0px -40px 0px'});
    document.querySelectorAll('.paper-card').forEach(function(el){ observer.observe(el); });

    highlightTimeline();
  }

  function highlightTimeline(){
    var groups = document.querySelectorAll('.date-group');
    var tItems = document.querySelectorAll('.timeline-item');
    var scrollY = window.scrollY + 160;
    var activeDate = null;
    groups.forEach(function(g){
      var anchor = g.querySelector('.date-anchor');
      if(anchor && anchor.getBoundingClientRect().top + window.scrollY <= scrollY){
        activeDate = g.querySelector('.date-anchor').id.replace('anchor-','');
      }
    });
    tItems.forEach(function(item){
      item.classList.toggle('active', item.dataset.date === activeDate);
    });
  }

  window.addEventListener('scroll', highlightTimeline, {passive:true});

  var searchInput = document.getElementById('searchInput');
  var searchCount = document.getElementById('searchCount');
  var debounceTimer;
  if(searchInput){
    searchInput.addEventListener('input', function(){
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(function(){
        var q = searchInput.value.trim().toLowerCase();
        var filtered;
        if(!q){ filtered = window.PAPERS; }
        else { filtered = window.PAPERS.filter(function(p){
          return (p.title && p.title.toLowerCase().indexOf(q)!==-1)
              || (p.summary && p.summary.toLowerCase().indexOf(q)!==-1)
              || (p.source && p.source.toLowerCase().indexOf(q)!==-1)
              || (p.badgeLabel && p.badgeLabel.toLowerCase().indexOf(q)!==-1);
        }); }
        searchCount.textContent = filtered.length + ' 篇';
        buildCards(filtered);
      }, 250);
    });
  }

  buildCards(window.PAPERS);
  buildTimeline();
})();
</script>
