name: Daily AI HOT Dashboard Update

on:
  schedule:
    # Beijing time 07:15 = UTC 23:15
    - cron: '15 23 * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate daily dashboard
        run: python generate_daily.py
        env:
          EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f daily_news.html archive/news/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: auto-update daily dashboard"
          for i in 1 2 3; do
            git pull --rebase origin main || { git rebase --abort; sleep $((RANDOM % 4 + 1)); continue; }
            if git push origin main; then
              echo "Pushed successfully (attempt $i)"
              break
            fi
            echo "Push rejected (remote moved), retrying ($i/3)..."
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
