name: Daily AI HOT Dashboard Update

on:
  schedule:
    # Beijing time 05:00 = UTC 21:00
    - cron: '0 21 * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate daily dashboard
        run: python generate_daily.py
        env:
          EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f daily_news.html news-archive/
          git diff --cached --quiet || (git commit -m "chore: auto-update daily dashboard" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
