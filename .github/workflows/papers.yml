name: Daily AI Papers Archive Update

on:
  schedule:
    # Beijing time 07:15 = UTC 23:15
    - cron: '15 23 * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  update-papers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate papers archive
        run: python generate_papers.py
        env:
          # 如果启用语义去重，请在仓库 Settings -> Secrets -> Actions 中添加 EMBEDDING_API_KEY
          EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f papers.html papers-archive/
          git diff --cached --quiet || (git commit -m "chore: auto-update papers archive" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
