name: Update Trending Radar

on:
  schedule:
    # 北京时间 08:30 = UTC 00:30
    - cron: '30 0 * * *'
    # 北京时间 15:30 = UTC 07:30
    - cron: '30 7 * * *'
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

jobs:
  update-trending:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate trending radar
        run: python generate_trending.py
        env:
          # 如果启用 AI 过滤，请在仓库 Settings -> Secrets -> Actions 中添加 DEEPSEEK_API_KEY
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f trending.html trending-archive/
          git diff --cached --quiet || (git commit -m "chore: auto-update trending radar" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
